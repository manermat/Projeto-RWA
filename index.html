<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RWA Token - Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="flex justify-between items-center p-6 bg-white shadow-sm">
        <h1 class="text-xl font-bold text-indigo-700">RWA Token</h1>
        <nav class="space-x-4">
            <button class="px-4 py-2 bg-indigo-50 text-indigo-700 rounded-lg">Marketplace</button>
            <button>Portfólio</button>
            <button class="px-4 py-2 bg-indigo-700 text-white rounded-lg">Começar KYC</button>
        </nav>
    </header>

    <main class="max-w-6xl mx-auto p-4">
        <section class="bg-indigo-600 text-white p-8 rounded-2xl mb-8 flex flex-col md:flex-row justify-between items-center">
            <div>
                <h2 class="text-2xl font-bold">Invista em Ativos Reais Tokenizados</h2>
                <p>Acesso democratizado a investimentos. Comece a partir de R$ 100.</p>
            </div>
            <div class="flex gap-4 mt-4 md:mt-0">
                <div class="bg-indigo-700 p-3 rounded-lg text-center"><span>R$ 75.5M</span><br><small>Volume Total</small></div>
                <div class="bg-indigo-700 p-3 rounded-lg text-center"><span>24</span><br><small>Ativos</small></div>
                <div class="bg-indigo-700 p-3 rounded-lg text-center"><span>1.247</span><br><small>Investidores</small></div>
            </div>
        </section>

        <div class="flex gap-2 mb-8 overflow-x-auto">
            <button class="px-4 py-2 border rounded-full bg-indigo-600 text-white">Todos</button>
            <button class="px-4 py-2 border rounded-full hover:bg-gray-100">Imóveis</button>
            <button class="px-4 py-2 border rounded-full hover:bg-gray-100">Agronegócio</button>
        </div>

        <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="bg-white p-4 rounded-xl shadow border">
                <img src="./images/pexels-marilda-alves-rosa-2149626128-32267405.jpg" alt="Ativo" class="rounded-lg mb-4">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="font-bold">Edifício Corporativo SP</h3>
                    <span class="bg-green-100 text-green-700 px-2 rounded text-sm">12.5% APY</span>
                </div>
                <p class="text-sm text-gray-500">São Paulo, SP</p>
                <hr class="my-4">
                <div class="text-sm space-y-1">
                    <div class="flex justify-between"><span>Valor Total</span><span class="font-semibold">R$ 15.000.000</span></div>
                    <div class="flex justify-between"><span>Preço do Token</span><span class="font-semibold">R$ 100</span></div>
                </div>
            </div>
            </section>
    </main>
</body>
</html>
